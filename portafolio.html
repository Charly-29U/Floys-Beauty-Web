<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Floys Beauty — Belleza del futuro. Portafolio fotográfico." />
  <title>Floys Beauty | Portafolio</title>
  <link rel="icon" href="logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Outfit:wght@300;400;500;600;700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="fluid-bg" aria-hidden="true"></div>
  <div class="noise-overlay" aria-hidden="true"></div>

  <header class="site-header glass">
    <a class="logo" href="index.html">
      <img src="logo.png" alt="Logo" class="logo-icon" />
      Floys<span class="logo-accent">Beauty</span>
    </a>
    <nav class="nav" aria-label="Principal">

      <a href="servicios.html">Servicios</a>
      <a href="portafolio.html" class="active">Portafolio</a>
      <a href="reservas.html">Reservas</a>
    </nav>
    <a class="btn btn-sm btn-glow" href="reservas.html">Reservar</a>
  </header>

  <main style="padding-top: 100px;">
    <section id="portafolio" class="portfolio">
      <div class="section-head">
        <h2 class="section-title" data-animate="fade">Portafolio <span class="holo-inline">holográfico</span></h2>
        <p class="section-lead" data-animate="fade">Frames de campañas recientes — efecto holograma y scanlines.</p>
      </div>
      <div class="holo-grid">
        <figure class="holo-card portfolio-item" data-animate="fade-up" data-category="social">
          <div class="holo-inner">
            <img src="https://images.unsplash.com/photo-1512496115841-a01baf15628e?auto=format&fit=crop&w=400&q=80" alt="Maquillaje social" loading="lazy" class="portfolio-img"/>
            <div class="portfolio-overlay"><span class="portfolio-zoom-icon">Ver Galería</span></div>
          </div>
          <figcaption>Maquillaje social</figcaption>
        </figure>
        
        <figure class="holo-card portfolio-item" data-animate="fade-up" data-category="novia">
          <div class="holo-inner">
            <img src="novia_civil.png" alt="Maquillaje novia" loading="lazy" class="portfolio-img"/>
            <div class="portfolio-overlay"><span class="portfolio-zoom-icon">Ver Galería</span></div>
          </div>
          <figcaption>Maquillaje novia</figcaption>
        </figure>

        <figure class="holo-card portfolio-item" data-animate="fade-up" data-category="quinceanera">
          <div class="holo-inner">
            <img src="https://images.unsplash.com/photo-1516975080661-46bdcb3961bb?auto=format&fit=crop&w=400&q=80" alt="Quinceañera" loading="lazy" class="portfolio-img"/>
            <div class="portfolio-overlay"><span class="portfolio-zoom-icon">Ver Galería</span></div>
          </div>
          <figcaption>Quinceañera</figcaption>
        </figure>

        <figure class="holo-card portfolio-item" data-animate="fade-up" data-category="glam_noche">
          <div class="holo-inner">
            <img src="https://images.unsplash.com/photo-1503236823255-94609f592e73?auto=format&fit=crop&w=400&q=80" alt="Glam de Noche" loading="lazy" class="portfolio-img"/>
            <div class="portfolio-overlay"><span class="portfolio-zoom-icon">Ver Galería</span></div>
          </div>
          <figcaption>Glam de noche</figcaption>
        </figure>

        <figure class="holo-card portfolio-item" data-animate="fade-up" data-category="social_dia_noche">
          <div class="holo-inner">
            <img src="https://images.unsplash.com/photo-1599423653151-c0e86b24feea?auto=format&fit=crop&w=400&q=80" alt="Social de dia y noche" loading="lazy" class="portfolio-img"/>
            <div class="portfolio-overlay"><span class="portfolio-zoom-icon">Ver Galería</span></div>
          </div>
          <figcaption>Social de día y noche</figcaption>
        </figure>

        <figure class="holo-card portfolio-item" data-animate="fade-up" data-category="fotos_pasarela">
          <div class="holo-inner">
            <img src="https://images.unsplash.com/photo-1596704017254-9b121068fb21?auto=format&fit=crop&w=400&q=80" alt="Fotos y pasarela" loading="lazy" class="portfolio-img"/>
            <div class="portfolio-overlay"><span class="portfolio-zoom-icon">Ver Galería</span></div>
          </div>
          <figcaption>Fotos y pasarela</figcaption>
        </figure>

        <figure class="holo-card portfolio-item" data-animate="fade-up" data-category="cejas">
          <div class="holo-inner">
            <img src="https://images.unsplash.com/photo-1616086708688-660c6d79e5ba?auto=format&fit=crop&w=400&q=80" alt="Cejas" loading="lazy" class="portfolio-img"/>
            <div class="portfolio-overlay"><span class="portfolio-zoom-icon">Ver Galería</span></div>
          </div>
          <figcaption>Cejas</figcaption>
        </figure>

        <figure class="holo-card portfolio-item" data-animate="fade-up" data-category="pestanas">
          <div class="holo-inner">
            <img src="https://images.unsplash.com/photo-1632168925203-b0e6bf3d2b27?auto=format&fit=crop&w=400&q=80" alt="Pestañas" loading="lazy" class="portfolio-img"/>
            <div class="portfolio-overlay"><span class="portfolio-zoom-icon">Ver Galería</span></div>
          </div>
          <figcaption>Pestañas</figcaption>
        </figure>

      </div>
    </section>
  </main>

  <footer class="site-footer glass">
    <div class="footer-row">
      <span>© <span id="year"></span> Floys Beauty</span>
      <nav class="social-nav" aria-label="Redes sociales">
        <a class="social-link" href="https://www.instagram.com/caicedosilemar" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 2C4.243 2 2 4.243 2 7v10c0 2.757 2.243 5 5 5h10c2.757 0 5-2.243 5-5V7c0-2.757-2.243-5-5-5H7zm0 2h10c1.654 0 3 1.346 3 3v10c0 1.654-1.346 3-3 3H7c-1.654 0-3-1.346-3-3V7c0-1.654 1.346-3 3-3zm5 2.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zm0 2a3.5 3.5 0 110 7 3.5 3.5 0 010-7zm5.25-.75a1.25 1.25 0 100 2.5 1.25 1.25 0 000-2.5z"/></svg>
          <span class="social-name">Instagram</span>
        </a>
        <a class="social-link" href="https://www.tiktok.com/@silemarcaicedo123" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-5.2 1.74 2.89 2.89 0 012.31-4.64 2.93 2.93 0 01.88.13V9.4a6.84 6.84 0 00-1-.05A6.33 6.33 0 005 20.1a6.34 6.34 0 0010.86-4.43v-7a8.16 8.16 0 004.77 1.52v-3.4a4.85 4.85 0 01-1-.1z"/></svg>
          <span class="social-name">TikTok</span>
        </a>
        <a class="social-link" href="https://www.facebook.com/share/1UCf5yJjuk/" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/></svg>
          <span class="social-name">Facebook</span>
        </a>
      </nav>
    </div>
    <span class="footer-tech">JS · GSAP</span>
  </footer>

  <!-- Modal Portafolio -->
  <div class="modal-overlay" id="portfolio-modal" aria-hidden="true">
    <div class="modal-content portfolio-modal-content">
      <button type="button" class="modal-close" id="portfolio-close" aria-label="Cerrar vista">&times;</button>
      <div class="modal-header">
        <h3 id="portfolio-modal-title">Portafolio</h3>
      </div>
      <div id="portfolio-gallery-grid" class="modal-gallery-grid">
        <!-- JS inyectará las imágenes aquí dinámicamente -->
      </div>
    </div>
  </div>

  <!-- Lightbox Modal (Zoom Individual) -->
  <div class="modal-overlay" id="lightbox-modal" aria-hidden="true" style="z-index: 3000;">
    <div class="modal-content" style="background:transparent; box-shadow:none; display:flex; justify-content:center; align-items:center; padding:0;">
      <button type="button" class="modal-close" id="lightbox-close" aria-label="Cerrar vista" style="background: rgba(0,0,0,0.5); color: #fff; top: 20px; right: 20px;">&times;</button>
      <img src="" id="lightbox-img" style="max-height: 90vh; max-width: 90vw; object-fit: contain; border-radius: var(--radius-sm);" />
    </div>
  </div>

  <div id="toast-notification" class="toast glass" role="alert" aria-hidden="true">
    <span id="toast-msg">Mensaje</span>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
