<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Glam Hub — Belleza del futuro. Portafolio fotográfico." />
  <title>Glam Hub | Portafolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Outfit:wght@300;400;500;600;700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="fluid-bg" aria-hidden="true"></div>
  <div class="noise-overlay" aria-hidden="true"></div>

  <header class="site-header glass">
    <a class="logo" href="index.html">
      <img src="logo.png" alt="Logo" class="logo-icon" />
      Glam<span class="logo-accent">Hub</span>
    </a>
    <nav class="nav" aria-label="Principal">

      <a href="servicios.html">Servicios</a>
      <a href="portafolio.html" class="active">Portafolio</a>
      <a href="reservas.html">Reservas</a>
    </nav>
    <a class="btn btn-sm btn-glow" href="reservas.html">Reservar</a>
  </header>

  <main style="padding-top: 100px;">
    <section id="portafolio" class="portfolio">
      <div class="section-head">
        <h2 class="section-title" data-animate="fade">Portafolio <span class="holo-inline">holográfico</span></h2>
        <p class="section-lead" data-animate="fade">Frames de campañas recientes — efecto holograma y scanlines.</p>
      </div>
      <div class="holo-grid">
        <figure class="holo-card portfolio-item" data-animate="fade-up" data-image="https://images.unsplash.com/photo-1512496115841-a01baf15628e?auto=format&fit=crop&w=800&q=80">
          <div class="holo-inner">
            <img src="https://images.unsplash.com/photo-1512496115841-a01baf15628e?auto=format&fit=crop&w=400&q=80" alt="Neón editorial" loading="lazy" class="portfolio-img"/>
            <div class="portfolio-overlay"><span class="portfolio-zoom-icon">⛶</span></div>
          </div>
          <figcaption>Campo cromático · 2026</figcaption>
        </figure>
        <figure class="holo-card portfolio-item" data-animate="fade-up" data-image="https://images.unsplash.com/photo-1487412947147-5cebf100ffc2?auto=format&fit=crop&w=800&q=80">
          <div class="holo-inner">
            <img src="https://images.unsplash.com/photo-1487412947147-5cebf100ffc2?auto=format&fit=crop&w=400&q=80" alt="Novia minimal" loading="lazy" class="portfolio-img"/>
            <div class="portfolio-overlay"><span class="portfolio-zoom-icon">⛶</span></div>
          </div>
          <figcaption>Luz natural HD</figcaption>
        </figure>
        <figure class="holo-card portfolio-item" data-animate="fade-up" data-image="https://images.unsplash.com/photo-1516975080661-46bdcb3961bb?auto=format&fit=crop&w=800&q=80">
          <div class="holo-inner">
            <img src="https://images.unsplash.com/photo-1516975080661-46bdcb3961bb?auto=format&fit=crop&w=400&q=80" alt="Pasarela" loading="lazy" class="portfolio-img"/>
            <div class="portfolio-overlay"><span class="portfolio-zoom-icon">⛶</span></div>
          </div>
          <figcaption>Backstage SS26</figcaption>
        </figure>
        <figure class="holo-card portfolio-item" data-animate="fade-up" data-image="https://images.unsplash.com/photo-1596704017254-9b121068fb21?auto=format&fit=crop&w=800&q=80">
          <div class="holo-inner">
            <img src="https://images.unsplash.com/photo-1596704017254-9b121068fb21?auto=format&fit=crop&w=400&q=80" alt="Beauty macro" loading="lazy" class="portfolio-img"/>
            <div class="portfolio-overlay"><span class="portfolio-zoom-icon">⛶</span></div>
          </div>
          <figcaption>Detalle labial</figcaption>
        </figure>
      </div>
    </section>
  </main>

  <footer class="site-footer glass">
    <div class="footer-row">
      <span>© <span id="year"></span> Glam Hub</span>
      <nav class="social-nav" aria-label="Redes sociales">
        <a class="social-link" href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 2C4.243 2 2 4.243 2 7v10c0 2.757 2.243 5 5 5h10c2.757 0 5-2.243 5-5V7c0-2.757-2.243-5-5-5H7zm0 2h10c1.654 0 3 1.346 3 3v10c0 1.654-1.346 3-3 3H7c-1.654 0-3-1.346-3-3V7c0-1.654 1.346-3 3-3zm5 2.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zm0 2a3.5 3.5 0 110 7 3.5 3.5 0 010-7zm5.25-.75a1.25 1.25 0 100 2.5 1.25 1.25 0 000-2.5z"/></svg>
          <span class="social-name">Instagram</span>
        </a>
      </nav>
    </div>
    <span class="footer-tech">JS · GSAP</span>
  </footer>

  <!-- Modal Portafolio -->
  <div class="modal-overlay" id="portfolio-modal" aria-hidden="true">
    <div class="modal-content">
      <button type="button" class="modal-close" id="portfolio-close" aria-label="Cerrar vista">&times;</button>
      <img src="" alt="Vista ampliada" id="portfolio-modal-img" />
    </div>
  </div>

  <div id="toast-notification" class="toast glass" role="alert" aria-hidden="true">
    <span id="toast-msg">Mensaje</span>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
