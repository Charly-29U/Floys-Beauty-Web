<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Floys Beauty — Belleza del futuro. Catálogo de servicios de maquillaje." />
  <title>Floys Beauty | Servicios</title>
  <link rel="icon" href="logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Outfit:wght@300;400;500;600;700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="fluid-bg" aria-hidden="true"></div>
  <div class="noise-overlay" aria-hidden="true"></div>

  <header class="site-header glass">
    <a class="logo" href="index.html">
      <img src="logo.png" alt="Logo" class="logo-icon" />
      Floys<span class="logo-accent">Beauty</span>
    </a>
    <nav class="nav" aria-label="Principal">

      <a href="servicios.html" class="active">Servicios</a>
      <a href="portafolio.html">Portafolio</a>
    </nav>
    <a class="btn btn-sm btn-glow" href="reservas.html">Reservar</a>
  </header>

  <main style="padding-top: 100px;">
    <section id="servicios" class="services">
      <div class="section-head">
        <h2 class="section-title" data-animate="fade">Servicios <span class="holo-inline">& Catálogo</span></h2>
        <p class="section-lead" data-animate="fade">Explora y selecciona el estilo ideal en nuestro catálogo en vivo o personaliza el tuyo.</p>
      </div>
      <div class="catalog-filters" data-animate="fade-up">
        <button type="button" class="catalog-filter active" data-category="social">Maquillaje social</button>
        <button type="button" class="catalog-filter" data-category="novia">Maquillaje novia</button>
        <button type="button" class="catalog-filter" data-category="quinceanera">Quinceañera</button>
        <button type="button" class="catalog-filter" data-category="glam_noche">Glam de noche</button>
        <button type="button" class="catalog-filter" data-category="social_dia_noche">Social de Día</button>
        <button type="button" class="catalog-filter" data-category="fotos_pasarela">Fotos y pasarela</button>
        <button type="button" class="catalog-filter" data-category="cejas">Cejas</button>
        <button type="button" class="catalog-filter" data-category="pestanas">Pestañas</button>
      </div>
      <div class="catalog-grid" id="catalog-grid" data-animate="fade">
        <!-- Tarjetas dinámicas de catálogo renderizadas por JS -->
      </div>
    </section>
  </main>

  <footer class="site-footer glass">
    <div class="footer-row">
      <span>© <span id="year"></span> Floys Beauty</span>
      <nav class="social-nav" aria-label="Redes sociales">
        <a class="social-link" href="https://www.instagram.com/caicedosilemar" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 2C4.243 2 2 4.243 2 7v10c0 2.757 2.243 5 5 5h10c2.757 0 5-2.243 5-5V7c0-2.757-2.243-5-5-5H7zm0 2h10c1.654 0 3 1.346 3 3v10c0 1.654-1.346 3-3 3H7c-1.654 0-3-1.346-3-3V7c0-1.654 1.346-3 3-3zm5 2.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zm0 2a3.5 3.5 0 110 7 3.5 3.5 0 010-7zm5.25-.75a1.25 1.25 0 100 2.5 1.25 1.25 0 000-2.5z"/></svg>
          <span class="social-name">Instagram</span>
        </a>
        <a class="social-link" href="https://www.tiktok.com/@silemarcaicedo123" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-5.2 1.74 2.89 2.89 0 012.31-4.64 2.93 2.93 0 01.88.13V9.4a6.84 6.84 0 00-1-.05A6.33 6.33 0 005 20.1a6.34 6.34 0 0010.86-4.43v-7a8.16 8.16 0 004.77 1.52v-3.4a4.85 4.85 0 01-1-.1z"/></svg>
          <span class="social-name">TikTok</span>
        </a>
        <a class="social-link" href="https://www.facebook.com/share/1UCf5yJjuk/" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/></svg>
          <span class="social-name">Facebook</span>
        </a>
      </nav>
    </div>
    <span class="footer-tech">JS · GSAP</span>
  </footer>

  <div id="toast-notification" class="toast glass" role="alert" aria-hidden="true">
    <span id="toast-msg">Mensaje</span>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
